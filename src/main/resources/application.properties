server.port=8080

#langchain4j大模型
#langchain4j.open-ai.chat-model.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
#langchain4j.open-ai.chat-model.api-key=${aliQwen-api}
#langchain4j.open-ai.chat-model.model-name=qwen-plus
##打开大模型日志配置，需要搭配logging.level.root使用
langchain4j.open-ai.chat-model.log-requests=true
langchain4j.open-ai.chat-model.log-responses=true
#查询大模型日志需要设置debug级别
logging.level.root=debug

#deepseek接入
deepseek.base-url=https://api.deepseek.com
deepseek.api-key=${deepseek-api}
deepseek.model-name=deepseek-chat

qwen.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
qwen.api-key=${aliQwen-api}
qwen.model-name=qwen3.7-max
qwen.embedding.model-name=text-embedding-v3
#qwen.model-name=qwen-plus

langchain4j.ollama.chat-model.base-url=http://localhost:11434
langchain4j.ollama.chat-model.model-name=deepseek-r1:1.5b
langchain4j.ollama.chat-model.log-requests=true
langchain4j.ollama.chat-model.log-responses=true

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/LaoMoAgent?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
spring.datasource.username=root
spring.datasource.password=18344200302
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 控制台打印sql
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ==========config redis===============
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.connect-timeout=3s
spring.data.redis.timeout=2s

# ==========config qdrant===============
qdrant.host=127.0.0.1
qdrant.port=6334
qdrant.use-tls=false
qdrant.collection-name=beijing-xiehe-hospital-2026

# ==========config elasticsearch===============
elasticsearch.host=localhost
elasticsearch.port=9200
elasticsearch.scheme=http
elasticsearch.username=
elasticsearch.password=
elasticsearch.index-name=beijing-xiehe-hospital-2026